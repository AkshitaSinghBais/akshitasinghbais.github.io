  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

code-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"b8bb23f4-0cc9-4a16-ae5c-9d7efe964031\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"8cfd2d21-6915-43f5-8420-6d5245197e08\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root {\n    --paper:    #F2EFE8;\n    --paper-2:  #EAE6DC;\n    --ink:      #14130F;\n    --ink-2:    #5C5852;\n    --ink-3:    #9B968C;\n    --rule:     #D8D2C5;\n    --rule-2:   #C7C0B0;\n    --chip:     #E5E0D3;\n    --lemon:    #F5E663;   /* muted lemon — highlighter emphasis */\n    --lav:      #C4B5E0;   /* dusty lavender — soft structural fills/rings/borders */\n    --lav-ink:  #6E5C97;   /* deep lavender — legible accent text, fine lines, glyphs */\n    --accent:   var(--lav-ink);          /* default accent = legible deep lavender */\n    --accent-2: rgba(110,92,151,0.14);\n    --accent-3: rgba(110,92,151,0.06);\n    --warn:     oklch(0.62 0.13 60);\n    --good:     oklch(0.55 0.10 150);\n    /* Slide 1 — per-stage stage colors */\n    --c-cat:     #2563EB;   /* blue   · category suggester */\n    --c-rule:    #D97706;   /* amber  · rule-based checks */\n    --c-fork:    #7C3AED;   /* purple · decision fork */\n    --c-fast:    #16A34A;   /* green  · fast / auto-approve */\n    --c-slow:    #EA580C;   /* orange · slow / manual review */\n    --c-human:   #DC2626;   /* red    · human auditor */\n    --c-outcome: #0D9488;   /* teal   · final listing outcome */\n    --display:  \"Space Grotesk\", ui-sans-serif, system-ui, sans-serif;\n    --body:     \"Geist\", ui-sans-serif, system-ui, sans-serif;\n    --mono:     \"JetBrains Mono\", ui-monospace, monospace;\n  }\n  * { box-sizing: border-box; }\n  html, body {\n    margin: 0; padding: 0;\n    background: #07070A;\n    color: var(--ink);\n    font-family: var(--body);\n    font-weight: 400;\n    overflow: hidden;\n    height: 100%;\n  }\n  /* ------------ stage scaffolding ------------ */\n  #stage {\n    position: fixed; inset: 0;\n    overflow: hidden;\n  }\n  #canvas {\n    width: 1920px; height: 1080px;\n    position: absolute;\n    left: 50%; top: 50%;\n    background: var(--paper);\n    transform-origin: 0 0;\n    box-shadow: 0 40px 120px rgba(0,0,0,0.4);\n    overflow: hidden;\n  }\n  .slide {\n    position: absolute; inset: 0;\n    opacity: 0;\n    pointer-events: none;\n    transition: opacity 0.55s ease;\n    padding: 88px 120px 88px 120px;\n    z-index: 1;\n  }\n  .slide.active {\n    opacity: 1;\n    pointer-events: auto;\n    z-index: 2;\n  }\n\n  /* ------------ persistent chrome ------------ */\n  .topbar {\n    position: absolute; top: 48px; left: 120px; right: 120px;\n    display: flex; align-items: center; justify-content: space-between;\n    font-family: var(--mono); font-size: 15px; letter-spacing: 0.04em;\n    color: var(--ink-3); text-transform: uppercase;\n    z-index: 10;\n  }\n  .topbar .title { color: var(--ink-2); }\n  .topbar .act { color: var(--accent); }\n  .footer {\n    position: absolute; bottom: 36px; left: 120px; right: 120px;\n    display: flex; align-items: center; justify-content: space-between;\n    font-family: var(--mono); font-size: 15px; color: var(--ink-3);\n    z-index: 10;\n  }\n  .progress {\n    display: flex; gap: 10px;\n  }\n  .progress .dot {\n    width: 28px; height: 2px; background: var(--rule);\n    transition: background 0.4s;\n  }\n  .progress .dot.done { background: var(--ink-3); }\n  .progress .dot.current { background: var(--accent); width: 56px; }\n\n  /* ------------ shared type ------------ */\n  h1, h2, h3 { font-family: var(--display); font-weight: 500; margin: 0; letter-spacing: -0.01em; }\n  h1 { font-size: 88px; line-height: 0.98; }\n  h2 { font-size: 56px; line-height: 1.02; }\n  h3 { font-size: 28px; line-height: 1.1; }\n  p  { margin: 0; }\n  .eyebrow {\n    font-family: var(--mono); font-size: 16px; letter-spacing: 0.12em;\n    text-transform: uppercase; color: var(--ink-3); font-weight: 400;\n  }\n  .accent {\n    background: var(--lemon);\n    color: var(--ink);\n    padding: 0.02em 0.2em;\n    border-radius: 2px;\n    box-decoration-break: clone;\n    -webkit-box-decoration-break: clone;\n  }\n\n  /* ------------ ACT 1 — old pipeline ------------ */\n  #act1 { background: var(--paper); }\n  .a1-head {\n    position: absolute; top: 124px; left: 120px; right: 120px;\n  }\n  .a1-head h1 { font-size: 72px; color: var(--ink); max-width: 1100px; }\n  .a1-head .sub {\n    margin-top: 18px; color: var(--ink-2); font-size: 22px; max-width: 900px;\n  }\n  .a1-stage {\n    position: absolute;\n    left: 80px; right: 80px; top: 340px; bottom: 140px;\n  }\n  .a1-pipe {\n    position: absolute; inset: 0;\n  }\n  /* SVG connector layer — sits beneath the boxes */\n  .a1-svg {\n    position: absolute; inset: 0;\n    width: 100%; height: 100%;\n    pointer-events: none;\n    z-index: 1;\n  }\n  /* Pipeline stage boxes — color-coded */\n  .a1-node {\n    position: absolute;\n    width: 220px;\n    background: var(--paper);\n    border: 2px solid var(--rule-2);\n    border-top: 4px solid var(--rule-2);\n    padding: 16px 18px 16px;\n    display: flex; flex-direction: column;\n    z-index: 2;\n  }\n  .a1-node .top {\n    display: flex; align-items: center; justify-content: space-between;\n    margin-bottom: 10px;\n  }\n  .a1-node .lbl {\n    font-family: var(--mono); font-size: 13px;\n    letter-spacing: 0.1em; color: var(--ink-3);\n    text-transform: uppercase; font-weight: 600;\n  }\n  .a1-node .emoji {\n    font-size: 30px; line-height: 1;\n    width: 44px; height: 44px;\n    display: grid; place-items: center;\n    border-radius: 8px;\n  }\n  .a1-node .name {\n    font-family: var(--display); font-size: 22px; color: var(--ink);\n    line-height: 1.1; font-weight: 500;\n  }\n  .a1-node .meta {\n    font-family: var(--mono); font-size: 14px; color: var(--ink-2);\n    margin-top: 8px;\n    font-weight: 500;\n  }\n\n  /* Per-stage colored borders + icon backgrounds */\n  .a1-node.cat     { border-color: var(--c-cat); }\n  .a1-node.cat     .emoji { background: color-mix(in srgb, var(--c-cat) 12%, transparent); }\n  .a1-node.cat     .lbl   { color: var(--c-cat); }\n  .a1-node.rule    { border-color: var(--c-rule); }\n  .a1-node.rule    .emoji { background: color-mix(in srgb, var(--c-rule) 14%, transparent); }\n  .a1-node.rule    .lbl   { color: var(--c-rule); }\n  .a1-node.fork    { border-color: var(--c-fork); }\n  .a1-node.fork    .emoji { background: color-mix(in srgb, var(--c-fork) 12%, transparent); }\n  .a1-node.fork    .lbl   { color: var(--c-fork); }\n  .a1-node.live    { border-color: var(--c-outcome); }\n  .a1-node.live    .emoji { background: color-mix(in srgb, var(--c-outcome) 12%, transparent); }\n  .a1-node.live    .lbl   { color: var(--c-outcome); }\n  .a1-node.queue   { border-color: var(--c-slow); }\n  .a1-node.queue   .emoji { background: color-mix(in srgb, var(--c-slow) 14%, transparent); }\n  .a1-node.queue   .lbl   { color: var(--c-slow); }\n  .a1-node.human   { border-color: var(--c-human); }\n  .a1-node.human   .emoji { background: color-mix(in srgb, var(--c-human) 14%, transparent); }\n  .a1-node.human   .lbl   { color: var(--c-human); }\n  .a1-node.reject  { border-color: var(--c-human); background: #1a1916; color: var(--paper); }\n  .a1-node.reject  .emoji { background: color-mix(in srgb, var(--c-human) 22%, transparent); }\n  .a1-node.reject  .lbl   { color: var(--c-human); }\n  .a1-node.reject  .name  { color: var(--paper); }\n  .a1-node.reject  .meta  { color: #C9C3B6; }\n\n  /* Queue specific: more horizontal */\n  .a1-queue-box {\n    position: absolute;\n    width: 320px;\n    background: var(--paper);\n    border: 2px solid var(--c-slow);\n    border-top: 4px solid var(--c-slow);\n    padding: 16px 18px;\n    z-index: 2;\n  }\n  .a1-queue-box .top {\n    display: flex; align-items: center; justify-content: space-between;\n    margin-bottom: 10px;\n  }\n  .a1-queue-box .lbl {\n    font-family: var(--mono); font-size: 13px; font-weight: 600;\n    color: var(--c-slow); letter-spacing: 0.1em; text-transform: uppercase;\n  }\n  .a1-queue-box .emoji {\n    font-size: 30px; line-height: 1;\n    width: 44px; height: 44px;\n    display: grid; place-items: center;\n    border-radius: 8px;\n    background: color-mix(in srgb, var(--c-slow) 14%, transparent);\n  }\n  .a1-queue-box .name {\n    font-family: var(--display); font-size: 22px; color: var(--ink);\n    font-weight: 500;\n  }\n  .a1-queue-box .ct {\n    font-family: var(--mono); font-size: 15px; color: var(--ink-2);\n    margin-top: 8px; font-weight: 600;\n  }\n  .a1-queue-box .slot-area {\n    margin-top: 12px; height: 60px;\n    border: 1px dashed color-mix(in srgb, var(--c-slow) 35%, transparent);\n    background: repeating-linear-gradient(\n      45deg, transparent 0 6px,\n      color-mix(in srgb, var(--c-slow) 6%, transparent) 6px 7px);\n  }\n\n  /* Inline branch-condition pill on connector lines */\n  .a1-branch-label {\n    position: absolute;\n    background: var(--paper);\n    border: 1.5px solid;\n    padding: 6px 12px;\n    font-family: var(--mono); font-size: 14px; font-weight: 600;\n    letter-spacing: 0.04em; text-transform: uppercase;\n    border-radius: 100px;\n    white-space: nowrap;\n    z-index: 3;\n    transform: translate(-50%, -50%);\n  }\n  .a1-branch-label.fast  { border-color: var(--c-fast); color: var(--c-fast); }\n  .a1-branch-label.slow  { border-color: var(--c-slow); color: var(--c-slow); }\n  .a1-branch-label.approve { border-color: var(--c-outcome); color: var(--c-outcome); }\n  .a1-branch-label.reject  { border-color: var(--c-human); color: var(--c-human); }\n\n  .a1-listing {\n    position: absolute; width: 11px; height: 11px;\n    border-radius: 50%;\n    background: var(--ink-2);\n    top: -5px; left: -5px;\n    pointer-events: none;\n    will-change: transform, opacity;\n    z-index: 4;\n    box-shadow: 0 0 0 2px var(--paper);\n  }\n\n  /* ------------ ACT 2 — 2x2 stakeholders ------------ */\n  #act2 .a2-head {\n    position: absolute; top: 124px; left: 120px; right: 120px;\n  }\n  #act2 h1 { font-size: 76px; }\n  .a2-grid {\n    position: absolute;\n    left: 120px; right: 120px;\n    top: 320px; bottom: 130px;\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    grid-template-rows: 1fr 1fr;\n    gap: 2px;\n    background: var(--rule-2);\n    border: 1px solid var(--rule-2);\n  }\n  .a2-cell {\n    background: var(--paper);\n    padding: 56px 56px 48px;\n    position: relative;\n    display: flex; flex-direction: column; justify-content: space-between;\n    opacity: 0;\n    transition: opacity 0.7s ease, transform 0.7s cubic-bezier(.2,.7,.2,1);\n    transform: translateY(8px);\n  }\n  .a2-cell.in { opacity: 1; transform: translateY(0); }\n  .a2-cell .role {\n    font-family: var(--mono); font-size: 18px;\n    letter-spacing: 0.16em; color: var(--ink-2);\n    text-transform: uppercase; font-weight: 600;\n  }\n  .a2-cell .icon {\n    position: absolute; top: 56px; right: 56px;\n    width: 64px; height: 64px;\n  }\n  .a2-cell h3 {\n    font-size: 38px; margin-top: 28px; color: var(--ink);\n    max-width: 560px;\n  }\n  .a2-cell .symptom {\n    margin-top: 32px;\n    color: var(--ink-2); font-size: 20px; line-height: 1.45;\n    max-width: 560px;\n    padding-top: 22px;\n    border-top: 1px solid var(--rule);\n  }\n  .a2-cell .symptom .accent { color: var(--ink); }\n  /* fracture line overlay */\n  .a2-cell .crack {\n    position: absolute; inset: 0; pointer-events: none;\n    opacity: 0;\n    transition: opacity 0.6s ease 0.2s;\n  }\n  .a2-cell.in .crack { opacity: 1; }\n\n  /* ------------ ACT 3 — beacon + 3 goals ------------ */\n  #act3 .a3-head {\n    position: absolute; top: 124px; left: 120px; right: 120px;\n  }\n  .a3-stage {\n    position: absolute;\n    left: 0; right: 0; top: 300px; bottom: 130px;\n    display: grid;\n    grid-template-columns: 720px 1fr;\n    gap: 80px;\n    padding: 0 120px;\n  }\n  .a3-beacon {\n    position: relative;\n    display: grid; place-items: center;\n  }\n  .a3-beacon svg { width: 100%; height: 100%; }\n  .a3-goals {\n    display: flex; flex-direction: column; justify-content: center;\n    gap: 56px;\n  }\n  .a3-goal {\n    display: grid; grid-template-columns: 60px 1fr; gap: 24px;\n    opacity: 0; transform: translateX(20px);\n    transition: opacity 0.7s ease, transform 0.7s cubic-bezier(.2,.7,.2,1);\n  }\n  .a3-goal.in { opacity: 1; transform: none; }\n  .a3-goal .num {\n    font-family: var(--mono); font-size: 18px; color: var(--accent);\n    padding-top: 14px;\n    letter-spacing: 0.1em; font-weight: 600;\n  }\n  .a3-goal h3 {\n    font-size: 36px; color: var(--ink); line-height: 1.1;\n  }\n  .a3-goal .body {\n    margin-top: 14px; color: var(--ink-2); font-size: 20px; line-height: 1.45;\n    max-width: 640px;\n  }\n\n  /* ------------ ACT 4 — agentic architecture ------------ */\n  #act4 .a4-head {\n    position: absolute; top: 124px; left: 120px; right: 120px;\n    display: flex; justify-content: space-between; align-items: flex-end;\n  }\n  #act4 h1 { font-size: 56px; max-width: 1100px; }\n  #act4 .a4-sub {\n    font-family: var(--mono); font-size: 15px; color: var(--ink-2);\n    text-transform: uppercase; letter-spacing: 0.12em;\n    text-align: right; font-weight: l LLMs<\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Rejection outcome / foreshadow tooltip -->\n          <div class=\"a1-node reject\" style=\"left: 1380px; top: 500px; width: 280px;\" id=\"a1Tooltip\">\n            <div class=\"top\">\n              <div class=\"lbl\">Seller is told<\u002Fdiv>\n              <div class=\"emoji\">❌<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"name\" style=\"font-size:18px; font-family: var(--mono); font-weight: 600;\">\"Listing rejected: policy violation.\"<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"footer\">\n        <div>What the seller sees on reject → <span style=\"font-family:var(--mono); color:var(--ink-2);\">a one-line, templated reason. No instruction. No learning.<\u002Fspan><\u002Fdiv>\n        <div class=\"progress\" data-progress=\"0\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ ACT 2 ============ -->\n    <section class=\"slide\" id=\"act2\" data-screen-label=\"02 Four stakeholders\">\n      <div class=\"topbar\">\n        <div class=\"title\">Listing Approval · IndiaMART · 300k/day<\u002Fdiv>\n        <div class=\"act\">Act 02 — Four stakeholders, four pains<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"a2-head\">\n        <div class=\"eyebrow\">Same pipeline, four very different experiences<\u002Fdiv>\n        <h1 style=\"margin-top:18px;\">Where the friction landed.<\u002Fh1>\n      <\u002Fdiv>\n\n      <div class=\"a2-grid\">\n        <div class=\"a2-cell\" data-cell=\"0\">\n          <div class=\"role\">Seller<\u002Fdiv>\n          <svg class=\"icon\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\">\n            <rect x=\"10\" y=\"14\" width=\"44\" height=\"36\" stroke=\"#14130F\"><\u002Frect>\n            <line x1=\"10\" y1=\"24\" x2=\"54\" y2=\"24\" stroke=\"#14130F\"><\u002Fline>\n            <line x1=\"18\" y1=\"34\" x2=\"38\" y2=\"34\" stroke=\"#9B968C\"><\u002Fline>\n            <line x1=\"18\" y1=\"40\" x2=\"32\" y2=\"40\" stroke=\"#9B968C\"><\u002Fline>\n            <circle cx=\"48\" cy=\"40\" r=\"4\" stroke=\"#6E5C97\"><\u002Fcircle>\n          <\u002Fsvg>\n          <h3>Vague rejections.<br>No way to learn.<\u002Fh3>\n          <p class=\"symptom\">\"Policy violation\" tells me nothing. I resubmit. I get rejected again. <span class=\"accent\">No feedback loop, no improvement.<\u002Fspan><\u002Fp>\n          <svg class=\"crack\" viewBox=\"0 0 800 400\" preserveAspectRatio=\"none\">\n            <path d=\"M0,140 L260,160 L300,120 L520,200 L640,170 L800,210\" stroke=\"rgba(20,19,15,0.06)\" stroke-width=\"1\" fill=\"none\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fdiv>\n\n        <div class=\"a2-cell\" data-cell=\"1\">\n          <div class=\"role\">Buyer<\u002Fdiv>\n          <svg class=\"icon\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\">\n            <circle cx=\"32\" cy=\"22\" r=\"9\" stroke=\"#14130F\"><\u002Fcircle>\n            <path d=\"M14 52 C14 40, 50 40, 50 52\" stroke=\"#14130F\"><\u002Fpath>\n            <line x1=\"44\" y1=\"14\" x2=\"56\" y2=\"26\" stroke=\"#6E5C97\"><\u002Fline>\n            <line x1=\"56\" y1=\"14\" x2=\"44\" y2=\"26\" stroke=\"#6E5C97\"><\u002Fline>\n          <\u002Fsvg>\n          <h3>Title says one thing.<br>Image shows another.<\u002Fh3>\n          <p class=\"symptom\">Free listings often mismatch their photos. Paid listings feel trustworthy. <span class=\"accent\">A trust gap forms across the marketplace.<\u002Fspan><\u002Fp>\n          <svg class=\"crack\" viewBox=\"0 0 800 400\" preserveAspectRatio=\"none\">\n            <path d=\"M0,200 L200,180 L280,240 L500,210 L620,260 L800,230\" stroke=\"rgba(20,19,15,0.06)\" stroke-width=\"1\" fill=\"none\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fdiv>\n\n        <div class=\"a2-cell\" data-cell=\"2\">\n          <div class=\"role\">Auditor<\u002Fdiv>\n          <svg class=\"icon\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\">\n            <circle cx=\"28\" cy=\"28\" r=\"14\" stroke=\"#14130F\"><\u002Fcircle>\n            <line x1=\"40\" y1=\"40\" x2=\"54\" y2=\"54\" stroke=\"#14130F\"><\u002Fline>\n            <line x1=\"22\" y1=\"28\" x2=\"34\" y2=\"28\" stroke=\"#9B968C\"><\u002Fline>\n            <line x1=\"28\" y1=\"22\" x2=\"28\" y2=\"34\" stroke=\"#9B968C\"><\u002Fline>\n            <circle cx=\"52\" cy=\"14\" r=\"4\" stroke=\"#6E5C97\"><\u002Fcircle>\n          <\u002Fsvg>\n          <h3>Generalists reviewing<br>specialist categories.<\u002Fh3>\n          <p class=\"symptom\">Auditors pasted unfamiliar products into external AI tools mid-review. <span class=\"accent\">Slow, inconsistent, error-prone.<\u002Fspan><\u002Fp>\n          <svg class=\"crack\" viewBox=\"0 0 800 400\" preserveAspectRatio=\"none\">\n            <path d=\"M0,120 L180,150 L260,110 L440,180 L600,140 L800,180\" stroke=\"rgba(20,19,15,0.06)\" stroke-width=\"1\" fill=\"none\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fdiv>\n\n        <div class=\"a2-cell\" data-cell=\"3\">\n          <div class=\"role\">Business<\u002Fdiv>\n          <svg class=\"icon\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\">\n            <polyline points=\"10,46 22,32 32,40 44,22 54,26\" stroke=\"#14130F\"><\u002Fpolyline>\n            <line x1=\"10\" y1=\"54\" x2=\"54\" y2=\"54\" stroke=\"#14130F\"><\u002Fline>\n            <circle cx=\"44\" cy=\"22\" r=\"3\" fill=\"#6E5C97\" stroke=\"none\"><\u002Fcircle>\n          <\u002Fsvg>\n          <h3>Cost scales with volume.<br>Audit gap on auto-approves.<\u002Fh3>\n          <p class=\"symptom\">Auto-approved free listings: title only checked, image never validated. <span class=\"accent\">A blind spot, growing daily.<\u002Fspan><\u002Fp>\n          <svg class=\"crack\" viewBox=\"0 0 800 400\" preserveAspectRatio=\"none\">\n            <path d=\"M0,160 L240,200 L320,140 L480,220 L640,180 L800,240\" stroke=\"rgba(20,19,15,0.06)\" stroke-width=\"1\" fill=\"none\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"footer\">\n        <div><\u002Fdiv>\n        <div class=\"progress\" data-progress=\"1\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ ACT 3 ============ -->\n    <section class=\"slide\" id=\"act3\" data-screen-label=\"03 What success looked like\">\n      <div class=\"topbar\">\n        <div class=\"title\">Listing Approval · IndiaMART · 300k/day<\u002Fdiv>\n        <div class=\"act\">Act 03 — What success had to look like<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"a3-head\">\n        <div class=\"eyebrow\">Three non-negotiables<\u002Fdiv>\n        <h1 style=\"margin-top:18px;\">The bar we set, before<br>we drew a single box.<\u002Fh1>\n      <\u002Fdiv>\n\n      <div class=\"a3-stage\">\n        <div class=\"a3-beacon\" id=\"a3Beacon\">\n          <svg viewBox=\"0 0 600 600\" width=\"600\" height=\"600\">\n            <!-- concentric rings -->\n            <g id=\"a3Rings\" stroke=\"rgba(110,92,151,0.30)\" fill=\"none\" stroke-width=\"1\">\n              <circle cx=\"300\" cy=\"300\" r=\"80\"><\u002Fcircle>\n              <circle cx=\"300\" cy=\"300\" r=\"140\"><\u002Fcircle>\n              <circle cx=\"300\" cy=\"300\" r=\"210\"><\u002Fcircle>\n              <circle cx=\"300\" cy=\"300\" r=\"280\"><\u002Fcircle>\n            <\u002Fg>\n            <!-- crosshair -->\n            <line x1=\"40\" y1=\"300\" x2=\"560\" y2=\"300\" stroke=\"var(--rule-2)\"><\u002Fline>\n            <line x1=\"300\" y1=\"40\" x2=\"300\" y2=\"560\" stroke=\"var(--rule-2)\"><\u002Fline>\n            <!-- target center -->\n            <circle cx=\"300\" cy=\"300\" r=\"20\" fill=\"var(--lemon)\" stroke=\"var(--lav-ink)\" stroke-width=\"1.5\"><\u002Fcircle>\n            <circle cx=\"300\" cy=\"300\" r=\"6\" fill=\"var(--lav-ink)\"><\u002Fcircle>\n            <!-- labels -->\n            <text x=\"300\" y=\"22\" font-family=\"JetBrains Mono\" font-size=\"11\" fill=\"#9B968C\" text-anchor=\"middle\" letter-spacing=\"2\">N<\u002Ftext>\n            <text x=\"300\" y=\"588\" font-family=\"JetBrains Mono\" font-size=\"11\" fill=\"#9B968C\" text-anchor=\"middle\" letter-spacing=\"2\">S<\u002Ftext>\n            <text x=\"20\" y=\"304\" font-family=\"JetBrains Mono\" font-size=\"11\" fill=\"#9B968C\" text-anchor=\"middle\" letter-spacing=\"2\">W<\u002Ftext>\n            <text x=\"580\" y=\"304\" font-family=\"JetBrains Mono\" font-size=\"11\" fill=\"#9B968C\" text-anchor=\"middle\" letter-spacing=\"2\">E<\u002Ftext>\n            <text x=\"300\" y=\"332\" font-family=\"JetBrains Mono\" font-size=\"11\" fill=\"#14130F\" text-anchor=\"middle\" letter-spacing=\"2\">TARGET<\u002Ftext>\n          <\u002Fsvg>\n        <\u002Fdiv>\n\n        <div class=\"a3-goals\" id=\"a3Goals\">\n          <div class=\"a3-goal\" data-goal=\"0\">\n            <div class=\"num\">01<\u002Fdiv>\n            <div>\n              <h3>Close the audit gap.<\u002Fh3>\n              <p class=\"body\">Every listing — free or paid — gets a full check across text and image.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"a3-goal\" data-goal=\"1\">\n            <div class=\"num\">02<\u002Fdiv>\n            <div>\n              <h3>Specific, actionable rejections.<\u002Fh3>\n              <p class=\"body\">Tell sellers exactly what to fix, not that they violated something abstract.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"a3-goal\" data-goal=\"2\">\n            <div class=\"num\">03<\u002Fdiv>\n            <div>\n              <h3>Specialist agents, not generalists.<\u002Fh3>\n              <p class=\"body\">Quality rises with volume. Cost stops scaling with it.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"footer\">\n        <div><\u002Fdiv>\n        <div class=\"progress\" data-progress=\"2\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ ACT 4 ============ -->\n    <section class=\"slide\" id=\"act4\" data-screen-label=\"04 Agentic pipeline\">\n      <div class=\"topbar\">\n        <div class=\"title\">Listing Approval · IndiaMART · 300k/day<\u002Fdiv>\n        <div class=\"act\">Act 04 — An orchestrated agentic pipeline<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"a4-head\">\n        <div>\n          <div class=\"eyebrow\">After — parallel, multimodal, specific<\u002Fdiv>\n          <h1 style=\"margin-top:18px;\">One listing.<br><span class=\"accent\">4 specialists.<\u002Fspan> In parallel.<\u002Fh1>\n        <\u002Fdiv>\n        <div class=\"a4-sub\">Hover any agent → what it does<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"a4-stage\" id=\"a4Stage\">\n        <!-- SVG layer for connection lines and data flow (vertical layout) -->\n        <svg class=\"a4-svg\" id=\"a4Svg\" viewBox=\"0 0 1920 730\" preserveAspectRatio=\"none\">\n          <defs>\n            <marker id=\"a4arrow\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\">\n              <path d=\"M0,0 L10,5 L0,10 z\" fill=\"#6E5C97\"><\u002Fpath>\n            <\u002Fmarker>\n          <\u002Fdefs>\n          <!-- input (top) → category suggester → orchestrator (middle) -->\n          <path id=\"a4-in\" d=\"M960,118 C960,170 960,210 960,250\" stroke=\"#6E5C97\" stroke-width=\"2\" fill=\"none\" opacity=\"0.7\"><\u002Fpath>\n          <!-- orchestrator center (960, 365) → 4 agents -->\n          <g stroke=\"#6E5C97\" stroke-width=\"1.4\" fill=\"none\" opacity=\"0.55\">\n            <!-- left column (right edges of agents at x=340) -->\n            <path class=\"a4-link\" d=\"M850,365 C690,365 500,300 340,300\"><\u002Fpath>\n            <path class=\"a4-link\" d=\"M850,365 C690,365 500,450 340,450\"><\u002Fpath>\n            <!-- right column (left edges of agents at x=1580) -->\n            <path class=\"a4-link\" d=\"M1070,365 C1230,365 1420,300 1580,300\"><\u002Fpath>\n            <path class=\"a4-link\" d=\"M1070,365 C1230,365 1420,450 1580,450\"><\u002Fpath>\n          <\u002Fg>\n          <!-- orchestrator → output (bottom) -->\n          <path id=\"a4-out\" d=\"M960,480 C960,510 960,520 960,530\" stroke=\"#6E5C97\" stroke-width=\"2.5\" fill=\"none\" marker-end=\"url(#a4arrow)\"><\u002Fpath>\n        <\u002Fsvg>\n\n        <!-- INPUT — top center -->\n        <div class=\"a4-input\">\n          <div class=\"lbl\">Input · Listing object<\u002Fdiv>\n          <div class=\"card\">\n            <div class=\"fields\">\n              <div class=\"field\"><span class=\"k\">title<\u002Fspan><span class=\"v\">\"Tikona kurta\"<\u002Fspan><\u002Fdiv>\n              <div class=\"field\"><span class=\"k\">description<\u002Fspan><span class=\"v\">cotton · M/L/XL<\u002Fspan><\u002Fdiv>\n              <div class=\"field\"><span class=\"k\">image<\u002Fspan><span class=\"v\">img_4821.jpg<\u002Fspan><\u002Fdiv>\n              <div class=\"field\"><span class=\"k\">category<\u002Fspan><span class=\"v\">apparel/men<\u002Fspan><\u002Fdiv>\n              <div class=\"field\"><span class=\"k\">price<\u002Fspan><span class=\"v\">₹ 499<\u002Fspan><\u002Fdiv>\n              <div class=\"field\"><span class=\"k\">tier<\u002Fspan><span class=\"v\">free<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- CATEGORY SUGGESTER — on the vertical line between input and orchestrator -->\n        <div class=\"a4-suggester\">\n          <svg class=\"glyph\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#6E5C97\" stroke-width=\"1.5\"><path d=\"M3 11 L11 3 L21 3 L21 13 L13 21 Z\"><\u002Fpath><circle cx=\"16.5\" cy=\"7.5\" r=\"1.6\"><\u002Fcircle><\u002Fsvg>\n          <div>\n            <div class=\"sname\">Category Suggester<\u002Fdiv>\n            <div class=\"ssub\">Internal model · proposes a starting category from the listing<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- ORCHESTRATOR — true center -->\n        <div class=\"a4-orch\">\n          <div class=\"ring\"><\u002Fdiv>\n          <div class=\"ring r2\"><\u002Fdiv>\n          <div class=\"ring r3\"><\u002Fdiv>\n          <div class=\"core\">\n            <div>\n              <div class=\"ttl\">Orchestrator<\u002Fdiv>\n              <div class=\"sub\">Dispatches in parallel<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- AGENTS — 2 left, 2 right -->\n        <div class=\"a4-agent\" style=\"left: 60px; top: 260px;\">\n          <svg class=\"glyph\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#6E5C97\" stroke-width=\"1.5\"><rect x=\"3\" y=\"3\" width=\"8\" height=\"8\"><\u002Frect><rect x=\"13\" y=\"3\" width=\"8\" height=\"8\"><\u002Frect><rect x=\"3\" y=\"13\" width=\"8\" height=\"8\"><\u002Frect><rect x=\"13\" y=\"13\" width=\"8\" height=\"8\"><\u002Frect><\u002Fsvg>\n          <div class=\"name\">Product Details ·<br>Category Consistency<\u002Fdiv>\n          <div class=\"desc\">Checks whether the category suggested by the internal model is correct w.r.t. the product details — and if not, corrects it and tags a new category.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"a4-agent\" style=\"left: 1580px; top: 260px;\">\n          <svg class=\"glyph\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#6E5C97\" stroke-width=\"1.5\"><rect x=\"3\" y=\"5\" width=\"18\" height=\"14\"><\u002Frect><circle cx=\"9\" cy=\"11\" r=\"2\"><\u002Fcircle><path d=\"M3 17 L9 13 L13 16 L21 10\"><\u002Fpath><\u002Fsvg>\n          <div class=\"name\">Image Compliance<\u002Fdiv>\n          <div class=\"desc\">Checks and removes images with PII, or blurry / stock / low-quality images.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"a4-agent\" style=\"left: 60px; top: 440px;\">\n          <svg class=\"glyph\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#6E5C97\" stroke-width=\"1.5\"><path d=\"M3 12 L9 12\"><\u002Fpath><path d=\"M15 12 L21 12\"><\u002Fpath><circle cx=\"12\" cy=\"12\" r=\"2.5\"><\u002Fcircle><path d=\"M12 5 L12 9\"><\u002Fpath><path d=\"M12 15 L12 19\"><\u002Fpath><\u002Fsvg>\n          <div class=\"name\">Product Internal<br>Consistency<\u002Fdiv>\n          <div class=\"desc\">Checks whether the product title–photo–specs combination matches, and flags if any contradiction is created.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"a4-agent\" style=\"left: 1580px; top: 440px;\">\n          <svg class=\"glyph\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#6E5C97\" stroke-width=\"1.5\"><rect x=\"4\" y=\"3\" width=\"16\" height=\"18\"><\u002Frect><line x1=\"7\" y1=\"8\" x2=\"17\" y2=\"8\"><\u002Fline><line x1=\"7\" y1=\"12\" x2=\"17\" y2=\"12\"><\u002Fline><line x1=\"7\" y1=\"16\" x2=\"13\" y2=\"16\"><\u002Fline><\u002Fsvg>\n          <div class=\"name\">Text Compliance<\u002Fdiv>\n          <div class=\"desc\">Checks if any PII or illegal information is mentioned.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- OUTPUT — bottom center -->\n        <div class=\"a4-output\">\n          <div class=\"lbl\">Verdict · Structured output<\u002Fdiv>\n          <div class=\"card\">\n            <div class=\"verdict-row\">\n              <div class=\"pill\">approve<\u002Fdiv>\n              <div class=\"pill on\">reject<\u002Fdiv>\n              <div class=\"pill\">escalate<\u002Fdiv>\n              <span style=\"margin-left:auto; font-family:var(--mono); font-size:12px; color:var(--ink-3); letter-spacing:0.08em;\">REASON_CODE · IMG_TITLE_MISMATCH<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"grid\">\n              <div class=\"reason\">\n                <span class=\"k\">Actionable reason · sent to seller<\u002Fspan>\n                Image does not match product title. Upload a clear photo of the actual \"Tikona kurta\" you are selling.\n              <\u002Fdiv>\n              <div class=\"compare\">\n                <span class=\"ttl\">Compare · Act 01<\u002Fspan>\n                <s>\"Listing rejected: policy violation.\"<\u002Fs>\n                <div style=\"margin-top:8px; color:var(--ink-2); font-style:italic;\">No instruction. No learning loop.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n\n      <div class=\"footer\">\n        <div>No more tier-based shortcut → every listing gets the full treatment<\u002Fdiv>\n        <div class=\"progress\" data-progress=\"3\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ ACT 5 ============ -->\n    <section class=\"slide\" id=\"act5\" data-screen-label=\"05 What changed\">\n      <div class=\"topbar\">\n        <div class=\"title\">Listing Approval · IndiaMART · 300k/day<\u002Fdiv>\n        <div class=\"act\">Act 05 — What changed, measurably<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"a5-head\">\n        <div class=\"eyebrow\">From rules &amp; queues to agents &amp; signals<\u002Fdiv>\n        <h1 style=\"margin-top:18px;\">The outcomes.<\u002Fh1>\n      <\u002Fdiv>\n\n      <div class=\"a5-grid\">\n        <div class=\"a5-card\">\n          <div>\n            <div class=\"lbl\">Precision · flagged listings<\u002Fdiv>\n            <div class=\"num\"><span data-count=\"95\">0<\u002Fspan><span class=\"unit\">%<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"desc\">When we flagged it, we were right 95 times out of 100.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"a5-card\">\n          <div>\n            <div class=\"lbl\">Recall · policy violations<\u002Fdiv>\n            <div class=\"num\"><span data-count=\"90\">0<\u002Fspan><span class=\"unit\">%<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"desc\">We caught nine in ten violations across the catalog.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"a5-card\">\n          <div>\n            <div class=\"lbl\">Catalog error surfaced<\u002Fdiv>\n            <div class=\"num\"><span data-count=\"12\">0<\u002Fspan><span class=\"unit\">%<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"desc\">Pre-existing errors detected &amp; corrected with detailed reasons.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"a5-card text\">\n          <div>\n            <div class=\"lbl\">Time to live<\u002Fdiv>\n            <div class=\"headline\">From <s style=\"color:var(--ink-3)\">days<\u002Fs> to <span class=\"accent\">hours.<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"desc\">Listings reach buyers the same day they're created.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"a5-card text big\">\n          <div>\n            <div class=\"lbl\">Manual review<\u002Fdiv>\n            <div class=\"headline\">Eliminated for the <span class=\"accent\">majority<\u002Fspan> of listings.<br>Humans now handle only genuine escalations.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"a5-card text\">\n          <div>\n            <div class=\"lbl\">Directory quality<\u002Fdiv>\n            <div class=\"headline\">Product coherency →<br><span class=\"accent\">trust restored.<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"a5-card text\">\n          <div>\n            <div class=\"lbl\">Operational cost<\u002Fdiv>\n            <div class=\"headline\">Decoupled from <span class=\"accent\">listing volume.<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"a5-measured\">\n        <div class=\"lead\">\n          <span class=\"eyebrow\">What I measured to get here<\u002Fspan>\n          The signals that told us the system was working — and when it wasn't.\n        <\u002Fdiv>\n        <ul>\n          <li>Precision, recall, F1 — per agent &amp; aggregated<\u002Fli>\n          <li>Confusion matrix tracked per category<\u002Fli>\n          <li>Time-to-decision distribution · p50, p95<\u002Fli>\n          <li>Escalation rate as an agent-quality signal<\u002Fli>\n          <li>Seller resubmission rate · UX proxy<\u002Fli>\n          <li>Title–image mismatch rate · trust proxy<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <div class=\"a5-close\">\n        The system now <span class=\"accent\">learns from every escalation.<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"footer\">\n        <div><\u002Fdiv>\n        <div class=\"progress\" data-progress=\"4\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n/* ============ SCALE STAGE ============ */\n(function(){\n  const canvas = document.getElementById('canvas');\n  function fit() {\n    const w = window.innerWidth, h = window.innerHeight;\n    const s = Math.min(w/1920, h/1080);\n    // translate -50% pre-scale, then scale, so canvas is centered without\n    // affecting the layout-box size that the parent measures.\n    canvas.style.transform = `translate(-50%, -50%) scale(${s}) translate(${(1-1/s)*960}px, ${(1-1/s)*540}px)`;\n    // Simpler equivalent: position center, then scale around center.\n    canvas.style.transform = `translate(-50%, -50%) scale(${s})`;\n    canvas.style.transformOrigin = 'center center';\n  }\n  window.addEventListener('resize', fit);\n  fit();\n})();\n\n/* ============ NAV ============ */\nconst slides = Array.from(document.querySelectorAll('.slide'));\nlet idx = 0;\nlet activeTimers = [];\n\nfunction clearTimers(){\n  activeTimers.forEach(t => clearTimeout(t));\n  activeTimers.forEach(t => clearInterval(t));\n  activeTimers = [];\n}\n\nfunction show(i){\n  if (i < 0 || i >= slides.length) return;\n  clearTimers();\n  slides.forEach((s,j) => s.classList.toggle('active', i === j));\n  idx = i;\n  // update all progress bars\n  document.querySelectorAll('.progress').forEach(p => {\n    p.innerHTML = '';\n    for (let k = 0; k < slides.length; k++) {\n      const d = document.createElement('div');\n      d.className = 'dot' + (k < idx ? ' done' : '') + (k === idx ? ' current' : '');\n      p.appendChild(d);\n    }\n  });\n  // activate the right scene\n  const id = slides[i].id;\n  if (id === 'act1') runAct1();\n  if (id === 'act2') runAct2();\n  if (id === 'act3') runAct3();\n  if (id === 'act4') runAct4();\n  if (id === 'act5') runAct5();\n  // post for speaker notes host\n  window.parent && window.parent.postMessage({slideIndexChanged: i}, '*');\n}\n\ndocument.addEventListener('keydown', (e) => {\n  if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') {\n    e.preventDefault();\n    if (idx < slides.length - 1) show(idx+1);\n  } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {\n    e.preventDefault();\n    if (idx > 0) show(idx-1);\n  } else if (e.key === 'Home') { show(0); }\n  else if (e.key === 'End') { show(slides.length-1); }\n});\n\n// click to advance\ndocument.getElementById('canvas').addEventListener('click', (e) => {\n  // Don't advance on agent hover area in act 4\n  if (e.target.closest('.a4-agent')) return;\n  const x = e.clientX;\n  const w = window.innerWidth;\n  if (x > w / 2) {\n    if (idx < slides.length - 1) show(idx+1);\n  } else {\n    if (idx > 0) show(idx-1);\n  }\n});\n\n/* ============ ACT 1 — flowing dots ============ */\nfunction runAct1(){\n  const stage = document.getElementById('a1Stage');\n  // clear residual dots\n  stage.querySelectorAll('.a1-listing').forEach(n => n.remove());\n  const queueCount = document.getElementById('a1QueueCount');\n  const tooltip = document.getElementById('a1Tooltip');\n  // tooltip is now a permanent node — pulse it instead\n  let qSize = 0;\n  queueCount.textContent = '0 waiting';\n\n  // Stage local coords roughly 1760 × 600.\n  // Track y ≈ 210 (matches connector line y in SVG).\n  // Boxes:\n  //   Cat suggester:  (40, 130) - (260, 320)\n  //   Rule:           (320, 130) - (540, 320)\n  //   Fork:           (600, 130) - (820, 320)\n  //   Live (top):     (1380, 60) - (1600, 245)\n  //   Queue:          (1020, 300) - (1340, ~450)\n  //   Human:          (1380, 290) - (1600, ~395)\n  //   Reject:         (1380, 500) - (1660, ~600)\n  // Connector y centers: top = 130 (fast lane), bottom = 360 (slow lane)\n  const trackY = 210;\n\n  function spawn(){\n    const dot = document.createElement('div');\n    dot.className = 'a1-listing';\n    stage.appendChild(dot);\n    const fastPath = Math.random() < 0.18; // most go to queue\n\n    function animSegment(from, to, dur, after){\n      const start = performance.now();\n      function frame(now){\n        const t = Math.min(1, (now - start) / dur);\n        dot.style.transform = `translate(${from.x + (to.x - from.x) * t}px, ${from.y + (to.y - from.y) * t}px)`;\n        if (t < 1) requestAnimationFrame(frame);\n        else after && after();\n      }\n      requestAnimationFrame(frame);\n    }\n\n    // through cat → rule → fork\n    animSegment({x: 0, y: trackY}, {x: 770, y: trackY}, 1500, () => {\n      if (fastPath) {\n        // green branch: arc up to Listing live (1340-1600 box, mid y ~ 130)\n        animSegment({x: 770, y: trackY}, {x: 1340, y: 130}, 900, () => {\n          animSegment({x: 1340, y: 130}, {x: 1500, y: 130}, 500, () => {\n            dot.style.transition = 'opacity 0.4s';\n            dot.style.opacity = 0;\n            setTimeout(() => dot.remove(), 400);\n          });\n        });\n      } else {\n        // orange branch: arc down into queue (1020-1340, y ~ 360)\n        animSegment({x: 770, y: trackY}, {x: 1020, y: 360}, 700, () => {\n          // settle inside queue\n          const jx = 1040 + Math.random()*280;\n          const jy = 380 + Math.random()*45;\n          animSegment({x: 1020, y: 360}, {x: jx, y: jy}, 500 + Math.random()*400, () => {\n            qSize++;\n            queueCount.textContent = qSize + ' waiting';\n            const willAudit = Math.random() < 0.35;\n            if (willAudit){\n              activeTimers.push(setTimeout(() => {\n                qSize = Math.max(0, qSize - 1);\n                queueCount.textContent = qSize + ' waiting';\n                // → human auditor\n                animSegment({x: jx, y: jy}, {x: 1430, y: 340}, 800, () => {\n                  const reject = Math.random() < 0.55;\n                  const targetY = reject ? 540 : 130;\n                  const targetX = reject ? 1450 : 1450;\n                  animSegment({x: 1430, y: 340}, {x: targetX, y: targetY}, 700, () => {\n                    if (reject) {\n                      // briefly pulse the rejection box\n                      tooltip.style.transition = 'transform 0.3s';\n                      tooltip.style.transform = 'translateY(-3px)';\n                      activeTimers.push(setTimeout(() => {\n                        tooltip.style.transform = 'translateY(0)';\n                      }, 350));\n                    }\n                    dot.style.transition = 'opacity 0.4s';\n                    dot.style.opacity = 0;\n                    setTimeout(() => dot.remove(), 400);\n                  });\n                });\n              }, 3000 + Math.random()*4000));\n            }\n          });\n        });\n      }\n    });\n  }\n\n  const spawnInt = setInterval(spawn, 340);\n  activeTimers.push(spawnInt);\n  for (let k = 0; k < 4; k++){\n    activeTimers.push(setTimeout(spawn, k * 220));\n  }\n}\n\n/* ============ ACT 2 — staggered cell entrance ============ */\nfunction runAct2(){\n  const cells = document.querySelectorAll('#act2 .a2-cell');\n  cells.forEach(c => c.classList.remove('in'));\n  cells.forEach((c, i) => {\n    activeTimers.push(setTimeout(() => c.classList.add('in'), 350 + i * 500));\n  });\n}\n\n/* ============ ACT 3 — beacon + goals ============ */\nfunction runAct3(){\n  const goals = document.querySelectorAll('#act3 .a3-goal');\n  goals.forEach(g => g.classList.remove('in'));\n  // pulse the beacon rings\n  const rings = document.querySelectorAll('#a3Rings circle');\n  rings.forEach((r, i) => {\n    r.style.transition = 'none';\n    r.style.opacity = 0;\n    activeTimers.push(setTimeout(() => {\n      r.style.transition = 'opacity 0.6s ease';\n      r.style.opacity = 1;\n    }, 200 + i * 250));\n  });\n  goals.forEach((g, i) => {\n    activeTimers.push(setTimeout(() => g.classList.add('in'), 800 + i * 450));\n  });\n}\n\n/* ============ ACT 4 — animate data flow ============ */\nfunction runAct4(){\n  const svg = document.getElementById('a4Svg');\n  // create or reset data dots along paths\n  svg.querySelectorAll('.flow').forEach(n => n.remove());\n  const links = svg.querySelectorAll('.a4-link');\n  // animate dots traveling outward & back\n  links.forEach((link, i) => {\n    const length = link.getTotalLength();\n    function spawnDot(){\n      const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');\n      c.setAttribute('r', '3');\n      c.setAttribute('fill', '#6E5C97');\n      c.setAttribute('class', 'flow');\n      svg.appendChild(c);\n      const dur = 1800 + Math.random()*600;\n      const start = performance.now();\n      function frame(now){\n        const t = (now - start) / dur;\n        if (t >= 1){\n          c.remove();\n          return;\n        }\n        // bounce out then back\n        const e = t < 0.5 ? t*2 : (1 - (t-0.5)*2);\n        const pt = link.getPointAtLength(length * e);\n        c.setAttribute('cx', pt.x);\n        c.setAttribute('cy', pt.y);\n        c.setAttribute('opacity', Math.sin(t * Math.PI));\n        requestAnimationFrame(frame);\n      }\n      requestAnimationFrame(frame);\n    }\n    activeTimers.push(setTimeout(() => {\n      spawnDot();\n      const intv = setInterval(spawnDot, 2200);\n      activeTimers.push(intv);\n    }, i * 180));\n  });\n\n  // animate input → orchestrator\n  function pulseInput(){\n    const p = document.getElementById('a4-in');\n    const len = p.getTotalLength();\n    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');\n    c.setAttribute('r', '4');\n    c.setAttribute('fill', '#14130F');\n    c.setAttribute('class', 'flow');\n    svg.appendChild(c);\n    const dur = 1400; const start = performance.now();\n    function frame(now){\n      const t = (now - start)/dur;\n      if (t >= 1) { c.remove(); return; }\n      const pt = p.getPointAtLength(len * t);\n      c.setAttribute('cx', pt.x); c.setAttribute('cy', pt.y);\n      requestAnimationFrame(frame);\n    }\n    requestAnimationFrame(frame);\n  }\n  function pulseOutput(){\n    const p = document.getElementById('a4-out');\n    const len = p.getTotalLength();\n    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');\n    c.setAttribute('r', '4');\n    c.setAttribute('fill', '#6E5C97');\n    c.setAttribute('class', 'flow');\n    svg.appendChild(c);\n    const dur = 1400; const start = performance.now();\n    function frame(now){\n      const t = (now - start)/dur;\n      if (t >= 1) { c.remove(); return; }\n      const pt = p.getPointAtLength(len * t);\n      c.setAttribute('cx', pt.x); c.setAttribute('cy', pt.y);\n      requestAnimationFrame(frame);\n    }\n    requestAnimationFrame(frame);\n  }\n  pulseInput();\n  activeTimers.push(setInterval(pulseInput, 2400));\n  activeTimers.push(setTimeout(() => {\n    pulseOutput();\n    activeTimers.push(setInterval(pulseOutput, 2400));\n  }, 1500));\n}\n\n/* ============ ACT 5 — counters ============ */\nfunction runAct5(){\n  const nums = document.querySelectorAll('#act5 [data-count]');\n  nums.forEach(n => n.textContent = '0');\n  nums.forEach((n, i) => {\n    const target = parseInt(n.dataset.count, 10);\n    activeTimers.push(setTimeout(() => {\n      const dur = 1400; const start = performance.now();\n      function frame(now){\n        const t = Math.min(1, (now - start) / dur);\n        const ease = 1 - Math.pow(1 - t, 3);\n        n.textContent = Math.round(target * ease);\n        if (t < 1) requestAnimationFrame(frame);\n        else n.textContent = target;\n      }\n      requestAnimationFrame(frame);\n    }, 200 + i * 200));\n  });\n}\n\n/* ============ INIT ============ */\nshow(0);\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
